; PlatformIO config for the Insole firmware (XIAO nRF52840 Sense Plus)
;
; Build:    pio run
; Upload:   pio run -t upload
; Monitor:  pio device monitor -b 921600
;
; To build the L-side, change DEVICE_NAME in main.cpp to "Insole_L".

[env:xiao_nrf52840_sense]
platform     = nordicnrf52
board        = xiaoblesense
framework    = arduino

; The Adafruit nRF52 Bluefruit framework provides bluefruit.h, InternalFileSystem.h,
; and Adafruit_LittleFS. The LSM6DS3 library is the Seeed Arduino driver for the
; built-in IMU on the Sense Plus.
lib_deps =
    seeed-studio/Seeed Arduino LSM6DS3

monitor_speed   = 921600
upload_protocol = nrfutil
